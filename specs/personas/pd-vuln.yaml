# CIPHER Agent Persona Spec — Vulnerability Management
# NICE Work Role: Vulnerability Assessment (SP-RSK-001)
# Category: Analyze / Protection & Defense

id: pd-vuln
nice_id: SP-RSK-001
nice_role: Vulnerability Assessment
nice_category: Analyze
nice_category_code: AN
cipher_agent_name: agent-pd-vuln
autonomy_default: T2  # Scan scheduling and remediation recommendations require human approval

description: |
  Continuously discovers, assesses, prioritizes, and tracks remediation of vulnerabilities
  across the organization's attack surface. Ingests scanner output (Nessus, Qualys, Trivy,
  Grype, etc.), correlates CVEs against the asset inventory, contextualizes severity with
  real-world exploitability data (EPSS, CISA KEV, threat actor targeting), and produces
  risk-ranked remediation work orders. Does not apply patches or changes autonomously —
  remediation execution is human-administered (T1). Operates in copilot mode (T2) for
  scan scheduling and remediation queue management.

primary_objective: |
  Maintain an always-current, risk-prioritized vulnerability register. Reduce mean-time-to-
  remediation (MTTR) for critical/exploitable vulnerabilities by surfacing actionable,
  context-enriched remediation guidance to asset owners and the security team.

# ──────────────────────────────────────────────────────────
# AUTHORIZED CAPABILITIES
# ──────────────────────────────────────────────────────────
authorized_tools:
  T3_autonomous:
    - vuln_db_query               # Query NVD, CVE, OSV, GitHub Advisory Database
    - epss_lookup                 # Exploit Prediction Scoring System lookup
    - cisa_kev_lookup             # CISA Known Exploited Vulnerabilities catalog
    - asset_db_query              # Read asset inventory and software BOM
    - scanner_results_ingest      # Pull and parse scanner output (read-only)
    - cve_to_asset_correlate      # Map CVEs to affected assets
    - risk_score_calculate        # Compute org-contextualized risk score
    - remediation_guidance_lookup # Retrieve patch/mitigation guidance
    - ticket_create               # Open remediation ticket
    - ticket_update               # Update ticket with new scan data
    - report_generate             # Produce vulnerability status report
    - sla_breach_alert            # Notify team when remediation SLA is at risk

  T2_requires_approval:
    - scan_schedule_create        # Schedule new vulnerability scan
    - scan_schedule_modify        # Modify existing scan schedule
    - remediation_priority_override  # Override auto-prioritization
    - exception_request_generate  # Produce compensating control exception request
    - vuln_register_update        # Commit changes to authoritative vulnerability register
    - asset_exposure_report_publish  # Publish executive-facing risk summary

  T1_advisory_only:
    # Agent can recommend; cannot invoke.
    - patch_deploy                # Human / change management executes
    - config_remediate            # Human sysadmin executes
    - emergency_patch_approve     # Change Advisory Board executes
    - asset_decommission_recommend  # Asset owner + management executes

forbidden_tools:
  - any_tool_not_in_authorized_list
  - direct_system_change
  - direct_firewall_change
  - direct_package_install
  - memory_write_to_other_agent_namespace

# ──────────────────────────────────────────────────────────
# MEMORY CONFIGURATION
# ──────────────────────────────────────────────────────────
memory:
  working:
    backend: redis
    ttl_seconds: 7200             # 2-hour scan analysis session
    max_tokens: 32000

  episodic:
    backend: timescaledb
    write: true                   # WORM log of all vuln assessments and risk decisions
    read_own: true
    read_cross_role:
      - pd-threat                 # Read actor targeting intel for exploitability context
      - pd-ir                     # Read incident records to identify exploited vulns post-incident
    justification: >
      Cross-role read from pd-threat enables exploitation likelihood contextualization.
      Cross-role read from pd-ir enables closed-loop feedback on exploited vulnerabilities,
      improving future prioritization accuracy.

  semantic:
    backend: chromadb             # Migrates to Weaviate at scale
    read_collections:
      - threat_intel              # Actor targeting and exploit campaigns
      - org_assets                # Asset inventory and software BOM
      - prior_incidents           # Historical exploited vulnerabilities
      - mitre_attack              # ATT&CK technique to CVE mappings
    write_collections:
      - vuln_register             # Authoritative vulnerability records
    write_requires_provenance: true
    min_source_trust_score: 0.75
    justification: >
      Write to vuln_register requires provenance to maintain data integrity of the
      authoritative risk record. Min trust score 0.75 rejects low-confidence scanner feeds.

  procedural:
    backend: gpg_signed_playbooks
    read_playbooks:
      - vuln_management_lifecycle
      - cvss_contextualization_guide
      - remediation_sla_policy
      - exception_handling_procedure
    write_playbooks: false

  credentials:
    backend: infisical
    secrets_accessed:
      - scanner_api_key           # Nessus / Qualys / Trivy API credentials
      - nvd_api_key
      - cisa_kev_api_key

# ──────────────────────────────────────────────────────────
# BEHAVIORAL BASELINES (for Behavioral Monitor)
# ──────────────────────────────────────────────────────────
behavioral_baselines:
  actions_per_hour: 200
  alert_threshold: 400
  max_vuln_db_queries_per_hour: 500
  max_asset_queries_per_hour: 200
  max_tickets_created_per_hour: 30
  max_t2_approvals_pending_simultaneously: 5
  alert_on_t1_tool_invocation_attempt: true
  alert_on_cross_namespace_memory_access: true
  suspend_on_forbidden_tool_attempt: true
  anomaly_actions:
    - bulk_asset_export           # Flag mass asset data downloads
    - scan_against_out_of_scope_ranges  # Flag unauthorized scan targets
    - repeated_exception_requests_same_asset  # Flag exception abuse pattern
    - risk_score_manipulation_pattern  # Flag unexpected score delta without new data

# ──────────────────────────────────────────────────────────
# LLM CONFIGURATION
# ──────────────────────────────────────────────────────────
llm_config:
  provider: litellm
  model: claude-3-5-sonnet        # Needed for multi-factor risk reasoning
  fallback_model: gpt-4o
  temperature: 0.0                # Fully deterministic — risk scores must be reproducible
  max_tokens: 4096
  context_window: 128000
  structured_output: true
  justification: >
    Temperature 0.0 enforces reproducibility of risk scoring decisions.
    Claude-3.5-Sonnet selected for its ability to synthesize CVSS, EPSS, KEV, and asset
    context into defensible prioritization rationales.

# ──────────────────────────────────────────────────────────
# STRUCTURED OUTPUT SCHEMA
# ──────────────────────────────────────────────────────────
output_schema:
  required_fields:
    - assessment_id               # UUID for this assessment run
    - scan_source                 # Scanner name and scan ID
    - findings                    # [{cve_id, cvss_score, epss_score, kev_listed, affected_assets, risk_score}]
    - top_risks                   # Top N risk-ranked findings with remediation guidance
    - sla_status                  # [{cve_id, sla_deadline, days_remaining, status}]
    - remediation_work_orders     # [{asset_id, cve_id, action, priority, owner}]
    - exceptions_pending          # [{cve_id, asset_id, justification, expiry}]
    - confidence_score            # 0.0–1.0 confidence in risk scoring
    - proposed_actions            # [{action, tier, rationale}]
  output_format: json

# ──────────────────────────────────────────────────────────
# INTER-AGENT RELATIONSHIPS
# ──────────────────────────────────────────────────────────
inter_agent_relationships:
  consumes_from:
    - orchestrator                # Tasking for ad-hoc assessments and scan requests
    - pd-threat                   # Actor-specific targeting intel for exploitability scoring
    - pd-ir                       # Post-incident exploited-vuln feedback
  produces_for:
    - pd-ir                       # Vulnerability context for active incidents
    - pd-defensive                # Alert enrichment with known-vuln context on assets
    - orchestrator                # Risk register updates, SLA breach notifications
  escalates_to:
    - pd-ir                       # If CISA KEV vuln detected and exploitation evidence found
    - orchestrator                # For SLA breaches on critical/high severity CVEs
  cannot_task:
    - og-*                        # Cannot task governance agents
    - io-sysadmin                 # No direct system changes — T1 only

# ──────────────────────────────────────────────────────────
# SPIFFE IDENTITY
# ──────────────────────────────────────────────────────────
identity:
  spiffe_id_template: "spiffe://cipher.{tenant_id}/ns/cipher/sa/pd-vuln/{instance_id}"
  svid_algorithm: Ed25519
  svid_ttl_seconds: 3600
  rotation: automatic
  opa_policy_ref: policies/pd-vuln.rego

# ──────────────────────────────────────────────────────────
# JULES IMPLEMENTATION TASKS
# ──────────────────────────────────────────────────────────
jules_tasks:
  - issue: "#012"
    title: "Implement agent-pd-vuln (Vulnerability Management)"
    tasks:
      - "Implement AgentPDVuln class in src/agents/pd_vuln/ following pd-defensive pattern"
      - "Write system prompt to /prompts/pd-vuln/system.md; emphasize reproducible risk scoring and clear SLA tracking"
      - "Write output schema to /prompts/pd-vuln/output_schema.json matching output_schema above"
      - "Implement T3 async tool methods: vuln_db_query, epss_lookup, cisa_kev_lookup, asset_db_query, scanner_results_ingest, cve_to_asset_correlate, risk_score_calculate, remediation_guidance_lookup, ticket_create, ticket_update, report_generate, sla_breach_alert"
      - "Implement composite risk score algorithm: weighted combination of CVSS base, EPSS percentile, KEV boolean, asset criticality, network exposure flag"
      - "Implement T2 proposal methods (produce recommendation structs; do NOT execute scans or register writes)"
      - "Write pytest tests covering: risk score calculation determinism, KEV integration, SLA breach detection, provenance enforcement on vuln_register writes, T1 boundary enforcement"
