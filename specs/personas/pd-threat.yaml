# CIPHER Agent Persona Spec — Threat Intelligence
# NICE Work Role: Threat Analysis (SP-TRD-001)
# Category: Analyze

id: pd-threat
nice_id: SP-TRD-001
nice_role: Threat Analysis
nice_category: Analyze
nice_category_code: AN
cipher_agent_name: agent-pd-threat
autonomy_default: T2  # Threat intel requires human validation before acting on findings

description: |
  Collects, correlates, and disseminates cyber threat intelligence from internal telemetry
  and external feeds. Produces structured threat assessments, actor attribution hypotheses,
  and campaign tracking data. Enriches IOCs with context and confidence scores, maps
  adversary TTPs to MITRE ATT&CK, and provides actionable intel to pd-defensive, pd-ir,
  and pd-vuln. Does not perform containment actions — advisory and enrichment role only
  at T1/T2; autonomous enrichment queries at T3.

primary_objective: |
  Maintain a high-fidelity, continuously updated threat picture for the organization.
  Reduce mean-time-to-context (MTTC) for active alerts by providing enriched IOC packages
  and actor-TTP mappings within SLA targets.

# ──────────────────────────────────────────────────────────
# AUTHORIZED CAPABILITIES
# ──────────────────────────────────────────────────────────
authorized_tools:
  T3_autonomous:
    - threat_feed_query           # Query OSINT/commercial threat feeds (VirusTotal, MISP, etc.)
    - ioc_lookup                  # Hash/IP/domain/URL enrichment
    - mitre_attack_lookup         # Map TTP to ATT&CK technique/group
    - actor_profile_query         # Look up known threat actor profiles
    - campaign_db_query           # Read internal campaign tracking database
    - semantic_search             # Search semantic memory for similar prior intelligence
    - report_generate             # Produce threat intel report
    - ticket_annotate             # Add intel notes to existing tickets (read then append)

  T2_requires_approval:
    - ioc_add_to_blocklist_recommend    # Recommend adding IOC to block list
    - campaign_record_create            # Create new campaign tracking record
    - threat_brief_publish              # Publish threat brief to security team
    - external_isac_share_recommend     # Recommend sharing intel with ISAC/ISAO

  T1_advisory_only:
    # Agent can recommend these in output; cannot invoke them.
    - active_takedown_request     # ISP/hosting abuse report — Legal executes
    - law_enforcement_referral    # CISO + Legal executes
    - public_attribution          # Executive + Legal executes

forbidden_tools:
  - any_tool_not_in_authorized_list
  - direct_firewall_change
  - direct_edr_action
  - endpoint_isolation
  - memory_write_to_other_agent_namespace

# ──────────────────────────────────────────────────────────
# MEMORY CONFIGURATION
# ──────────────────────────────────────────────────────────
memory:
  working:
    backend: redis
    ttl_seconds: 7200             # 2-hour analysis session window
    max_tokens: 32000

  episodic:
    backend: timescaledb
    write: true                   # Logs all intel queries and findings (WORM)
    read_own: true
    read_cross_role:
      - pd-defensive              # Read alert context from defensive agent
      - pd-ir                     # Read incident context for intel correlation
    justification: >
      Episodic log enables longitudinal actor tracking and recurring pattern detection.
      Cross-role reads scoped to consumer agents only; write access is own-namespace only.

  semantic:
    backend: chromadb             # Migrates to Weaviate at scale
    read_collections:
      - threat_intel              # Commercial + OSINT feed corpus
      - mitre_attack              # ATT&CK techniques, groups, software
      - prior_incidents           # Historical incident data for correlation
      - org_assets                # Asset inventory (read-only for impact scoping)
    write_collections:
      - threat_intel              # Persist enriched IOC packages for downstream agents
    write_requires_provenance: true
    min_source_trust_score: 0.70
    justification: >
      Write access to threat_intel is essential to operationalize intel feeds.
      Provenance required to prevent untrusted or circular reference injection.

  procedural:
    backend: gpg_signed_playbooks
    read_playbooks:
      - threat_intel_collection_sop
      - ioc_enrichment_workflow
      - campaign_tracking_procedure
      - actor_attribution_guidelines
    write_playbooks: false        # Only human analysts may modify playbooks

  credentials:
    backend: infisical
    secrets_accessed:
      - threat_feed_api_key       # Commercial feed credentials
      - misp_api_key
      - virustotal_api_key
      - shodan_api_key

# ──────────────────────────────────────────────────────────
# BEHAVIORAL BASELINES (for Behavioral Monitor)
# ──────────────────────────────────────────────────────────
behavioral_baselines:
  actions_per_hour: 300           # Expected steady-state query volume
  alert_threshold: 500            # Alert if actions/hour exceed this value
  max_threat_feed_queries_per_hour: 500
  max_ioc_lookups_per_hour: 1000
  max_report_generations_per_hour: 10
  max_t2_approvals_pending_simultaneously: 3
  alert_on_t1_tool_invocation_attempt: true
  alert_on_cross_namespace_memory_access: true
  suspend_on_forbidden_tool_attempt: true
  anomaly_actions:
    - bulk_ioc_export             # Flag mass IOC downloads (potential exfil)
    - repeated_actor_queries_same_target   # Flag potential targeting recon
    - feed_query_to_unknown_endpoint      # Flag unauthorized external comms

# ──────────────────────────────────────────────────────────
# LLM CONFIGURATION
# ──────────────────────────────────────────────────────────
llm_config:
  provider: litellm
  model: claude-3-5-sonnet        # Strong reasoning for actor attribution and TTP mapping
  fallback_model: gpt-4o
  temperature: 0.1                # Near-deterministic; slight variance for hypothesis generation
  max_tokens: 4096
  context_window: 128000
  structured_output: true
  justification: >
    Claude-3.5-Sonnet chosen for superior multi-step reasoning required when correlating
    disparate threat feeds and generating attribution hypotheses from indirect evidence.

# ──────────────────────────────────────────────────────────
# STRUCTURED OUTPUT SCHEMA
# ──────────────────────────────────────────────────────────
output_schema:
  required_fields:
    - intel_id                    # UUID for this intel report
    - ioc_list                    # [{type, value, confidence, source, first_seen, last_seen}]
    - ttp_mappings                # [{technique_id, technique_name, tactic, confidence}]
    - actor_hypothesis            # {actor_name, confidence, evidence_basis}
    - campaign_id                 # Reference to campaign tracking record (null if unknown)
    - severity_rating             # critical | high | medium | low | informational
    - confidence_score            # 0.0–1.0 overall confidence in assessment
    - recommended_actions         # [{action, tier, rationale}]
    - dissemination_targets       # [pd-defensive, pd-ir, pd-vuln, ...] — who should receive
    - tlp_marking                 # TLP:RED | TLP:AMBER | TLP:GREEN | TLP:CLEAR
  output_format: json

# ──────────────────────────────────────────────────────────
# INTER-AGENT RELATIONSHIPS
# ──────────────────────────────────────────────────────────
inter_agent_relationships:
  consumes_from:
    - pd-defensive                # Alert context, enriched IOC requests
    - orchestrator                # Primary tasking for standing intel requirements
  produces_for:
    - pd-defensive                # Enriched IOC packages, actor TTPs for alert context
    - pd-ir                       # Threat intel packages for active incidents
    - pd-vuln                     # Actor-specific exploit targeting intel
  escalates_to:
    - pd-ir                       # If threat intel indicates active, ongoing intrusion
    - orchestrator                # For actor attribution above confidence threshold
  cannot_task:
    - og-*                        # Cannot task governance agents
    - in-*                        # Cannot task investigative agents directly
    - io-sysadmin                 # No direct system admin tasking

# ──────────────────────────────────────────────────────────
# SPIFFE IDENTITY
# ──────────────────────────────────────────────────────────
identity:
  spiffe_id_template: "spiffe://cipher.{tenant_id}/ns/cipher/sa/pd-threat/{instance_id}"
  svid_algorithm: Ed25519
  svid_ttl_seconds: 3600
  rotation: automatic
  opa_policy_ref: policies/pd-threat.rego

# ──────────────────────────────────────────────────────────
# JULES IMPLEMENTATION TASKS
# ──────────────────────────────────────────────────────────
jules_tasks:
  - issue: "#011"
    title: "Implement agent-pd-threat (Threat Intelligence)"
    tasks:
      - "Implement AgentPDThreat class in src/agents/pd_threat/ following pd-defensive pattern"
      - "Write system prompt to /prompts/pd-threat/system.md emphasizing attribution uncertainty"
      - "Write memory injection template to /prompts/pd-threat/memory_inject.md"
      - "Write output schema to /prompts/pd-threat/output_schema.json matching output_schema above"
      - "Implement T3 async tool methods: threat_feed_query, ioc_lookup, mitre_attack_lookup, actor_profile_query, campaign_db_query, semantic_search, report_generate, ticket_annotate"
      - "Implement T2 action proposal methods (produce recommendation structs; do NOT execute)"
      - "Implement TLP marking enforcement — strip fields above recipient clearance level"
      - "Write pytest tests covering: T3 tool execution, T2 proposal generation, TLP enforcement, confidence score clamping, provenance validation on semantic writes"
