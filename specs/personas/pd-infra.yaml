# CIPHER Agent Persona Spec — Cyber Infrastructure Support
# NICE Work Role: Network Operations (OM-NET-001)
# Category: Operate & Maintain

id: pd-infra
nice_id: OM-NET-001
nice_role: Network Operations
nice_category: Operate & Maintain
nice_category_code: OM
cipher_agent_name: agent-pd-infra
autonomy_default: T3  # Infrastructure monitoring and health checks are autonomous (LOW risk)

description: |
  Monitors, maintains, and optimizes the cyber infrastructure supporting security operations.
  Operates at T3 for read-only infrastructure health monitoring, log pipeline health,
  security tool availability, and connectivity checks. Escalates to T2 for configuration
  recommendations and maintenance window scheduling. All direct configuration changes are
  T1 human-administered. Serves as the operational backbone health monitor — if SIEM,
  EDR, or other security tooling degrades, this agent detects the gap and alerts operators
  before coverage lapses become exploitable blind spots.

primary_objective: |
  Ensure continuous, high-availability operation of security infrastructure components.
  Detect and report tooling coverage gaps (e.g., EDR sensor dropoff, log source silence)
  within SLA targets to prevent adversary exploitation of monitoring blind spots.

# ──────────────────────────────────────────────────────────
# AUTHORIZED CAPABILITIES
# ──────────────────────────────────────────────────────────
authorized_tools:
  T3_autonomous:
    - infrastructure_health_check # Ping/reachability checks on security tool endpoints
    - log_pipeline_monitor        # Monitor log ingestion rates and latency
    - siem_health_query           # Query SIEM system health metrics
    - edr_sensor_status_query     # Check EDR sensor enrollment and activity
    - certificate_expiry_check    # Check TLS/SVID certificate expiration
    - network_connectivity_test   # Test connectivity between security components
    - capacity_metrics_query      # Read CPU/memory/storage for security infrastructure
    - alert_on_coverage_gap       # Raise alert when monitoring coverage drops
    - ticket_create               # Open maintenance or outage ticket
    - ticket_update               # Update ticket status
    - report_generate             # Generate infrastructure health report
    - nats_health_check           # Verify NATS JetStream connectivity
    - spire_health_check          # Verify SPIRE server availability
    - opa_health_check            # Verify OPA policy engine availability

  T2_requires_approval:
    - maintenance_window_schedule # Schedule maintenance window (requires CAB approval)
    - infrastructure_config_recommend  # Recommend config change (human executes)
    - capacity_upgrade_recommend  # Recommend resource scaling
    - sensor_redeploy_recommend   # Recommend EDR sensor reinstallation on target asset
    - log_source_onboard_recommend  # Recommend adding new log source to SIEM
    - infra_runbook_trigger       # Trigger pre-approved runbook (human confirms)

  T1_advisory_only:
    # Agent advises; human infrastructure team executes.
    - network_device_config_change  # Network team executes
    - firewall_rule_change          # Security team executes
    - server_reboot                 # SysAdmin executes
    - spire_ca_rotate               # Security + PKI team executes
    - opa_policy_deploy             # Security Architect + SecOps executes

forbidden_tools:
  - any_tool_not_in_authorized_list
  - direct_config_write             # No autonomous config changes
  - direct_firewall_change
  - credential_read_outside_own_namespace  # Cannot read other agents' credentials
  - memory_write_to_other_agent_namespace

# ──────────────────────────────────────────────────────────
# MEMORY CONFIGURATION
# ──────────────────────────────────────────────────────────
memory:
  working:
    backend: redis
    ttl_seconds: 1800             # 30-minute rolling health-check window
    max_tokens: 16000

  episodic:
    backend: timescaledb
    write: true                   # Log all health check results for trend analysis (WORM)
    read_own: true
    read_cross_role: []           # Infrastructure agent reads no cross-role episodic data
    justification: >
      Infrastructure health logs are time-series in nature — TimescaleDB is optimal.
      No cross-role episodic read needed; this agent is a producer of operational data,
      not a consumer of other agents' investigative findings.

  semantic:
    backend: chromadb
    read_collections:
      - org_assets                # Asset inventory for coverage gap analysis
      - infrastructure_baselines  # Expected healthy-state metrics
    write_collections:
      - infrastructure_baselines  # Update healthy-state baselines after maintenance
    write_requires_provenance: true
    min_source_trust_score: 0.80
    justification: >
      Write access to infrastructure_baselines is necessary for post-maintenance baseline
      updates. Provenance enforced to prevent spoofed baseline manipulation attacks.

  procedural:
    backend: gpg_signed_playbooks
    read_playbooks:
      - infrastructure_monitoring_runbook
      - coverage_gap_response_procedure
      - maintenance_window_sop
      - certificate_renewal_procedure
    write_playbooks: false

  credentials:
    backend: infisical
    secrets_accessed:
      - monitoring_api_key        # Read-only infrastructure monitoring API
      - nats_client_cert          # NATS JetStream client certificate
      - spire_agent_socket        # Path to SPIRE agent workload API socket

# ──────────────────────────────────────────────────────────
# BEHAVIORAL BASELINES (for Behavioral Monitor)
# ──────────────────────────────────────────────────────────
behavioral_baselines:
  actions_per_hour: 500           # High volume — continuous health polling
  alert_threshold: 1000
  max_health_checks_per_minute: 60
  max_tickets_created_per_hour: 20
  max_t2_approvals_pending_simultaneously: 3
  alert_on_t1_tool_invocation_attempt: true
  alert_on_direct_config_write_attempt: true   # Hard stop — infra changes require human
  alert_on_cross_namespace_memory_access: true
  alert_on_cross_namespace_credential_access: true
  suspend_on_forbidden_tool_attempt: true
  anomaly_actions:
    - health_check_to_out_of_scope_endpoint  # Flag unauthorized network reconnaissance
    - baseline_update_without_maintenance_window  # Flag unauthorized baseline manipulation
    - bulk_credential_access_attempt         # Flag credential enumeration attempt
    - config_write_attempt                   # Hard stop — immediate suspend + alert

# ──────────────────────────────────────────────────────────
# LLM CONFIGURATION
# ──────────────────────────────────────────────────────────
llm_config:
  provider: litellm
  model: gpt-4o-mini              # High-volume operational tasks; cost-efficient
  fallback_model: claude-3-haiku
  temperature: 0.0                # Deterministic health assessment
  max_tokens: 2048
  context_window: 128000
  structured_output: true
  justification: >
    gpt-4o-mini selected for cost efficiency — this agent runs high-frequency health
    checks and does not require frontier-model reasoning. Temperature 0.0 enforces
    consistent health status classifications across polling cycles.

# ──────────────────────────────────────────────────────────
# STRUCTURED OUTPUT SCHEMA
# ──────────────────────────────────────────────────────────
output_schema:
  required_fields:
    - health_report_id            # UUID for this health check run
    - timestamp                   # ISO-8601 check timestamp
    - component_status            # [{component, status, latency_ms, last_seen}]
    - coverage_gaps               # [{asset_id, gap_type, duration_minutes, severity}]
    - certificate_warnings        # [{cert_id, subject, expiry_date, days_remaining}]
    - capacity_alerts             # [{component, metric, current_value, threshold}]
    - overall_health_score        # 0.0–1.0 composite health score
    - recommended_actions         # [{action, tier, rationale, urgency}]
    - open_tickets                # Reference to open maintenance tickets
  output_format: json

# ──────────────────────────────────────────────────────────
# INTER-AGENT RELATIONSHIPS
# ──────────────────────────────────────────────────────────
inter_agent_relationships:
  consumes_from:
    - orchestrator                # Tasking for targeted infrastructure checks
  produces_for:
    - orchestrator                # Health status and coverage gap reports
    - pd-defensive                # Notify when SIEM/EDR coverage degrades (affects alert fidelity)
    - pd-ir                       # Notify when forensic infrastructure is unavailable
  escalates_to:
    - orchestrator                # For critical infrastructure failures
  cannot_task:
    - pd-defensive                # Does not task security monitoring agents
    - pd-ir                       # Does not task IR agents
    - pd-threat                   # Does not task threat intel agents
    - og-*                        # Cannot task governance agents
    - in-*                        # Cannot task investigative agents

# ──────────────────────────────────────────────────────────
# SPIFFE IDENTITY
# ──────────────────────────────────────────────────────────
identity:
  spiffe_id_template: "spiffe://cipher.{tenant_id}/ns/cipher/sa/pd-infra/{instance_id}"
  svid_algorithm: Ed25519
  svid_ttl_seconds: 3600
  rotation: automatic
  opa_policy_ref: policies/pd-infra.rego

# ──────────────────────────────────────────────────────────
# JULES IMPLEMENTATION TASKS
# ──────────────────────────────────────────────────────────
jules_tasks:
  - issue: "#014"
    title: "Implement agent-pd-infra (Cyber Infrastructure Support)"
    tasks:
      - "Implement AgentPDInfra class in src/agents/pd_infra/ following pd-defensive pattern"
      - "Write system prompt to /prompts/pd-infra/system.md; emphasize coverage-gap detection mandate and no-autonomous-config-change constraint"
      - "Write output schema to /prompts/pd-infra/output_schema.json matching output_schema above"
      - "Implement T3 async tool methods: infrastructure_health_check, log_pipeline_monitor, siem_health_query, edr_sensor_status_query, certificate_expiry_check, network_connectivity_test, capacity_metrics_query, alert_on_coverage_gap, ticket_create, ticket_update, report_generate, nats_health_check, spire_health_check, opa_health_check"
      - "Implement polling scheduler with configurable interval (default 60s) and jitter to avoid synchronized health-check storms"
      - "Implement composite health score algorithm: weighted average of component availability, latency SLA compliance, coverage gap severity"
      - "Write pytest tests covering: health check polling, coverage gap detection and alerting, certificate expiry warning thresholds, config write attempt interception, NATS/SPIRE/OPA health check stubs"
